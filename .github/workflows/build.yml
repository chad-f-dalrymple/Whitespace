name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: dist/*.dmg
          - os: windows-latest
            artifact: dist/*.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-installer
          path: ${{ matrix.artifact }}
